name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run deps:audit
      - name: Run npm test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/babel-o-npm-test.log
      - name: Print npm test failure tail
        if: failure()
        run: tail -200 /tmp/babel-o-npm-test.log || true
      - run: npm run build:smoke
