name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-bbl:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: bbl-darwin-arm64
          - os: macos-15-intel
            artifact: bbl-darwin-x64
          - os: ubuntu-latest
            artifact: bbl-linux-x64
          - os: windows-latest
            artifact: bbl-windows-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run build:binary
        shell: bash
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/bbl.exe "${{ matrix.artifact }}"
          else
            mv dist/bbl "${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-go-tui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: go-tui-darwin-arm64
            binary_name: go-tui
          - os: macos-15-intel
            artifact: go-tui-darwin-x64
            binary_name: go-tui
          - os: ubuntu-latest
            artifact: go-tui-linux-x64
            binary_name: go-tui
          - os: windows-latest
            artifact: go-tui-windows-x64.exe
            binary_name: go-tui.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: clients/go-tui
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: clients/go-tui/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build Go TUI prebuilt binary
        run: |
          mkdir -p bin
          VERSION="$(node -p "require('../../package.json').version")"
          COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/sutang-vain/babel-o/clients/go-tui/internal/tui"
          LDFLAGS="-X ${VERSION_PKG}.Version=${VERSION} -X ${VERSION_PKG}.Commit=${COMMIT} -X ${VERSION_PKG}.BuildDate=${BUILD_DATE}"
          go build -ldflags "$LDFLAGS" -o "bin/${{ matrix.binary_name }}" ./cmd/go-tui
      - name: Verify Go TUI version metadata
        run: ./bin/${{ matrix.binary_name }} --version
      - name: Rename Go TUI asset
        run: mv "bin/${{ matrix.binary_name }}" "bin/${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: clients/go-tui/bin/${{ matrix.artifact }}

  release:
    needs:
      - build-bbl
      - build-go-tui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="docs/releases/${{ github.ref_name }}.md"
          if [ -f "$NOTES_FILE" ]; then
            NOTES_ARGS=(--notes-file "$NOTES_FILE")
          else
            NOTES_ARGS=(--generate-notes)
          fi

          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" artifacts/* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              "${NOTES_ARGS[@]}" \
              artifacts/*
          fi
